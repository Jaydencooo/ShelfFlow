server:
  port: ${APP_PORT:${SHELFFLOW_ADMIN_SERVICE_PORT:4012}}

spring:
  application:
    name: ${APP_NAME:shelfflow-admin-service}
  redis:
    host: ${REDIS_HOST:127.0.0.1}
    port: ${REDIS_PORT:6379}
    password: ${REDIS_PASSWORD:}
    database: ${REDIS_DATABASE:1}
    timeout: ${REDIS_TIMEOUT_MS:2000}
  rabbitmq:
    host: ${RABBITMQ_HOST:127.0.0.1}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_DEFAULT_USER:guest}
    password: ${RABBITMQ_DEFAULT_PASS:guest}
    virtual-host: ${RABBITMQ_VIRTUAL_HOST:/}
  datasource:
    url: jdbc:mysql://${DB_HOST:127.0.0.1}:${DB_PORT:3306}/${DB_NAME:shelfflow}?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  cloud:
    nacos:
      discovery:
        enabled: ${SHELFFLOW_NACOS_ENABLED:false}
        server-addr: ${SHELFFLOW_NACOS_SERVER_ADDR:127.0.0.1:8848}
        namespace: ${SHELFFLOW_NACOS_NAMESPACE:}
        group: ${SHELFFLOW_NACOS_GROUP:DEFAULT_GROUP}
    sentinel:
      enabled: ${SHELFFLOW_SENTINEL_ENABLED:false}
      eager: ${SHELFFLOW_SENTINEL_EAGER:true}
      transport:
        dashboard: ${SHELFFLOW_SENTINEL_DASHBOARD:}

mybatis:
  mapper-locations: classpath:/mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true

shelfflow:
  runtime:
    app-name: ${APP_NAME:shelfflow-admin-service}
    app-env: ${APP_ENV:development}
    log-level: ${LOG_LEVEL:INFO}
    api-prefix: ${API_PREFIX:/api}
    cors-allowed-origins: ${CORS_ALLOWED_ORIGINS:http://127.0.0.1:3000}
  jwt:
    secret: ${JWT_SECRET:dev-shelfflow-jwt-secret-change-me}
    expires-in: ${JWT_EXPIRES_IN:PT12H}
  legacy:
    base-url: ${SHELFFLOW_LEGACY_BACKEND_BASE_URL:http://127.0.0.1:8082}
  admin:
    loss-stats:
      expiring-soon-days: ${LOSS_STATS_EXPIRING_SOON_DAYS:3}
      suggestion-limit: ${LOSS_STATS_SUGGESTION_LIMIT:8}
      estimated-cost-rate: ${LOSS_STATS_ESTIMATED_COST_RATE:0.65}
      operating-expense-amount: ${LOSS_STATS_OPERATING_EXPENSE_AMOUNT:0}
    ai-ops:
      provider: ${AI_OPS_PROVIDER:local}
      model: ${AI_OPS_MODEL:shelfflow-rules-v1}
      api-key: ${AI_OPS_API_KEY:}
      base-url: ${AI_OPS_BASE_URL:}
      chat-completions-path: ${AI_OPS_CHAT_COMPLETIONS_PATH:/v1/chat/completions}
      request-timeout-seconds: ${AI_OPS_REQUEST_TIMEOUT_SECONDS:20}
      max-tokens: ${AI_OPS_MAX_TOKENS:1200}
      temperature: ${AI_OPS_TEMPERATURE:0.2}
      suggestion-limit: ${AI_OPS_SUGGESTION_LIMIT:20}
      retrieval-limit: ${AI_OPS_RETRIEVAL_LIMIT:4}
    storefront-cache:
      invalidation-enabled: ${ADMIN_STOREFRONT_CACHE_INVALIDATION_ENABLED:false}
      redis-key-prefix: ${STOREFRONT_CATALOG_CACHE_REDIS_KEY_PREFIX:shelfflow:storefront:catalog}
      scan-count: ${ADMIN_STOREFRONT_CACHE_SCAN_COUNT:200}
      fail-open: ${ADMIN_STOREFRONT_CACHE_FAIL_OPEN:true}
    order-events:
      consumer:
        enabled: ${ADMIN_ORDER_EVENTS_CONSUMER_ENABLED:false}
        exchange: ${USER_ORDER_EVENTS_EXCHANGE:shelfflow.order.events}
        queue: ${ADMIN_ORDER_EVENTS_CONSUMER_QUEUE:shelfflow.admin.order-events.inbox}
        routing-key: ${ADMIN_ORDER_EVENTS_CONSUMER_ROUTING_KEY:shelfflow.order.*}
        durable-exchange: ${ADMIN_ORDER_EVENTS_CONSUMER_DURABLE_EXCHANGE:true}
        durable-queue: ${ADMIN_ORDER_EVENTS_CONSUMER_DURABLE_QUEUE:true}
        fail-fast: ${ADMIN_ORDER_EVENTS_CONSUMER_FAIL_FAST:true}
  sentinel:
    enabled: ${SHELFFLOW_SENTINEL_ENABLED:false}
    flow-rules:
      - resource: /api/admin/products
        grade: qps
        count: ${SHELFFLOW_SENTINEL_ADMIN_PRODUCTS_QPS:80}
      - resource: /api/admin/inventory-batches
        grade: qps
        count: ${SHELFFLOW_SENTINEL_ADMIN_BATCHES_QPS:60}
      - resource: /api/admin/orders
        grade: qps
        count: ${SHELFFLOW_SENTINEL_ADMIN_ORDERS_QPS:60}
      - resource: /api/admin/ai-ops/chat
        grade: qps
        count: ${SHELFFLOW_SENTINEL_ADMIN_AI_CHAT_QPS:5}

management:
  endpoints:
    web:
      base-path: /
      exposure:
        include: health,info
