spring:
  datasource:
    url: jdbc:h2:mem:shelfflow_admin_test;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  sql:
    init:
      mode: always
      schema-locations: classpath:/db/test/schema.sql
      data-locations: classpath:/db/test/data.sql
  cloud:
    nacos:
      discovery:
        enabled: false

shelfflow:
  runtime:
    app-name: shelfflow-admin-service-test
    app-env: test
    log-level: INFO
    api-prefix: /api
    cors-allowed-origins:
      - http://127.0.0.1:3000
  jwt:
    secret: test-secret
    expires-in: PT12H
  legacy:
    base-url: http://127.0.0.1:8082
