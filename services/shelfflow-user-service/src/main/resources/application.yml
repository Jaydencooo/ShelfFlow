server:
  port: ${APP_PORT:${SHELFFLOW_USER_SERVICE_PORT:4013}}

spring:
  application:
    name: ${APP_NAME:shelfflow-user-service}
  mail:
    host: ${SHELFFLOW_MAIL_HOST:}
    port: ${SHELFFLOW_MAIL_PORT:465}
    username: ${SHELFFLOW_MAIL_USERNAME:}
    password: ${SHELFFLOW_MAIL_PASSWORD:}
    protocol: smtp
    properties:
      mail:
        smtp:
          auth: ${SHELFFLOW_MAIL_SMTP_AUTH:true}
          ssl:
            enable: ${SHELFFLOW_MAIL_SSL:true}
          starttls:
            enable: ${SHELFFLOW_MAIL_STARTTLS:false}
          connectiontimeout: ${SHELFFLOW_MAIL_CONNECTION_TIMEOUT_MS:10000}
          timeout: ${SHELFFLOW_MAIL_TIMEOUT_MS:10000}
          writetimeout: ${SHELFFLOW_MAIL_WRITE_TIMEOUT_MS:10000}
  redis:
    host: ${REDIS_HOST:127.0.0.1}
    port: ${REDIS_PORT:6379}
    password: ${REDIS_PASSWORD:}
    database: ${REDIS_DATABASE:1}
    timeout: ${REDIS_TIMEOUT_MS:2000}
  datasource:
    url: jdbc:mysql://${DB_HOST:127.0.0.1}:${DB_PORT:3306}/${DB_NAME:shelfflow}?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  cloud:
    nacos:
      discovery:
        enabled: ${SHELFFLOW_NACOS_ENABLED:false}
        server-addr: ${SHELFFLOW_NACOS_SERVER_ADDR:127.0.0.1:8848}
        namespace: ${SHELFFLOW_NACOS_NAMESPACE:}
        group: ${SHELFFLOW_NACOS_GROUP:DEFAULT_GROUP}
    sentinel:
      enabled: ${SHELFFLOW_SENTINEL_ENABLED:false}
      eager: ${SHELFFLOW_SENTINEL_EAGER:true}
      transport:
        dashboard: ${SHELFFLOW_SENTINEL_DASHBOARD:}

mybatis:
  mapper-locations: classpath:/mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true

shelfflow:
  runtime:
    app-name: ${APP_NAME:shelfflow-user-service}
    app-env: ${APP_ENV:development}
    log-level: ${LOG_LEVEL:INFO}
    api-prefix: ${API_PREFIX:/api}
    cors-allowed-origins: ${CORS_ALLOWED_ORIGINS:http://127.0.0.1:3000}
  jwt:
    secret: ${JWT_SECRET:dev-shelfflow-jwt-secret-change-me}
    expires-in: ${JWT_EXPIRES_IN:PT12H}
  user:
    auth:
      min-account-length: ${USER_AUTH_MIN_ACCOUNT_LENGTH:4}
      max-account-length: ${USER_AUTH_MAX_ACCOUNT_LENGTH:64}
      min-password-length: ${USER_AUTH_MIN_PASSWORD_LENGTH:8}
      max-password-length: ${USER_AUTH_MAX_PASSWORD_LENGTH:32}
      min-display-name-length: ${USER_AUTH_MIN_DISPLAY_NAME_LENGTH:2}
      max-display-name-length: ${USER_AUTH_MAX_DISPLAY_NAME_LENGTH:32}
      verification-code-length: ${USER_AUTH_VERIFICATION_CODE_LENGTH:6}
      verification-code-ttl-seconds: ${USER_AUTH_VERIFICATION_CODE_TTL_SECONDS:300}
      expose-debug-verification-code: ${USER_AUTH_EXPOSE_DEBUG_VERIFICATION_CODE:true}
      mail:
        enabled: ${SHELFFLOW_MAIL_ENABLED:false}
        from: ${SHELFFLOW_MAIL_FROM:${SHELFFLOW_MAIL_USERNAME:}}
        from-name: ${SHELFFLOW_MAIL_FROM_NAME:ShelfFlow}
        subject: ${SHELFFLOW_MAIL_SUBJECT:ShelfFlow 验证码}
    order:
      pickup-point: ${USER_ORDER_PICKUP_POINT:滨江社区前置仓 A 区}
      order-number-prefix: ${USER_ORDER_NUMBER_PREFIX:SFU}
      pickup-code-length: ${USER_ORDER_PICKUP_CODE_LENGTH:6}
      pickup-deadline-hours: ${USER_ORDER_PICKUP_DEADLINE_HOURS:24}
      default-pay-method: ${USER_ORDER_DEFAULT_PAY_METHOD:1}
      default-preparation-mode: ${USER_ORDER_DEFAULT_PREPARATION_MODE:1}
      default-fulfillment-type: ${USER_ORDER_DEFAULT_FULFILLMENT_TYPE:2}
      default-package-strategy: ${USER_ORDER_DEFAULT_PACKAGE_STRATEGY:1}
      default-fulfillment-fee: ${USER_ORDER_DEFAULT_FULFILLMENT_FEE:0}
      default-package-count: ${USER_ORDER_DEFAULT_PACKAGE_COUNT:0}
      inventory-reservation:
        mode: ${USER_ORDER_INVENTORY_RESERVATION_MODE:database}
        redis-key-prefix: ${USER_ORDER_INVENTORY_REDIS_KEY_PREFIX:shelfflow:inventory:batch}
        reservation-ttl-seconds: ${USER_ORDER_INVENTORY_RESERVATION_TTL_SECONDS:900}
        fail-open: ${USER_ORDER_INVENTORY_RESERVATION_FAIL_OPEN:false}
  sentinel:
    enabled: ${SHELFFLOW_SENTINEL_ENABLED:false}
    flow-rules:
      - resource: /api/user/catalog/products
        grade: qps
        count: ${SHELFFLOW_SENTINEL_USER_CATALOG_QPS:120}
      - resource: /api/user/cart/items
        grade: qps
        count: ${SHELFFLOW_SENTINEL_USER_CART_QPS:80}
      - resource: /api/user/orders
        grade: qps
        count: ${SHELFFLOW_SENTINEL_USER_ORDERS_QPS:40}
      - resource: /api/user/auth/verification-code
        grade: qps
        count: ${SHELFFLOW_SENTINEL_USER_VERIFY_CODE_QPS:10}

management:
  endpoints:
    web:
      base-path: /
      exposure:
        include: health,info
