server:
  port: ${APP_PORT:${SHELFFLOW_USER_SERVICE_PORT:4013}}

spring:
  application:
    name: ${APP_NAME:shelfflow-user-service}
  datasource:
    url: jdbc:mysql://${DB_HOST:127.0.0.1}:${DB_PORT:3306}/${DB_NAME:shelfflow}?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:bape050622}
    driver-class-name: com.mysql.cj.jdbc.Driver
  cloud:
    nacos:
      discovery:
        enabled: ${SHELFFLOW_NACOS_ENABLED:false}
        server-addr: ${SHELFFLOW_NACOS_SERVER_ADDR:127.0.0.1:8848}

mybatis:
  mapper-locations: classpath:/mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true

shelfflow:
  runtime:
    app-name: ${APP_NAME:shelfflow-user-service}
    app-env: ${APP_ENV:development}
    log-level: ${LOG_LEVEL:INFO}
    api-prefix: ${API_PREFIX:/api}
    cors-allowed-origins: ${CORS_ALLOWED_ORIGINS:http://127.0.0.1:3000}
  jwt:
    secret: ${JWT_SECRET:dev-shelfflow-jwt-secret-change-me}
    expires-in: ${JWT_EXPIRES_IN:PT12H}
  user:
    auth:
      min-account-length: ${USER_AUTH_MIN_ACCOUNT_LENGTH:4}
      max-account-length: ${USER_AUTH_MAX_ACCOUNT_LENGTH:64}
      min-password-length: ${USER_AUTH_MIN_PASSWORD_LENGTH:8}
      max-password-length: ${USER_AUTH_MAX_PASSWORD_LENGTH:32}
      min-display-name-length: ${USER_AUTH_MIN_DISPLAY_NAME_LENGTH:2}
      max-display-name-length: ${USER_AUTH_MAX_DISPLAY_NAME_LENGTH:32}
    order:
      pickup-point: ${USER_ORDER_PICKUP_POINT:滨江社区前置仓 A 区}
      order-number-prefix: ${USER_ORDER_NUMBER_PREFIX:SFU}
      pickup-code-length: ${USER_ORDER_PICKUP_CODE_LENGTH:6}
      pickup-deadline-hours: ${USER_ORDER_PICKUP_DEADLINE_HOURS:24}
      default-pay-method: ${USER_ORDER_DEFAULT_PAY_METHOD:1}
      default-preparation-mode: ${USER_ORDER_DEFAULT_PREPARATION_MODE:1}
      default-fulfillment-type: ${USER_ORDER_DEFAULT_FULFILLMENT_TYPE:2}
      default-package-strategy: ${USER_ORDER_DEFAULT_PACKAGE_STRATEGY:1}
      default-fulfillment-fee: ${USER_ORDER_DEFAULT_FULFILLMENT_FEE:0}
      default-package-count: ${USER_ORDER_DEFAULT_PACKAGE_COUNT:0}

management:
  endpoints:
    web:
      base-path: /
      exposure:
        include: health,info
