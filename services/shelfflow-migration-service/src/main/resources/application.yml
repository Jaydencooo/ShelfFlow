spring:
  application:
    name: ${APP_NAME:shelfflow-migration-service}
  main:
    web-application-type: none
  datasource:
    url: jdbc:mysql://${DB_HOST:127.0.0.1}:${DB_PORT:3306}/${DB_NAME:shelfflow}?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: ${SHELFFLOW_FLYWAY_BASELINE_ON_MIGRATE:true}
    baseline-version: ${SHELFFLOW_FLYWAY_BASELINE_VERSION:202605000000}
    validate-on-migrate: ${SHELFFLOW_FLYWAY_VALIDATE_ON_MIGRATE:true}
    out-of-order: ${SHELFFLOW_FLYWAY_OUT_OF_ORDER:false}
    table: ${SHELFFLOW_FLYWAY_SCHEMA_HISTORY_TABLE:flyway_schema_history}
    clean-disabled: true

logging:
  level:
    root: ${LOG_LEVEL:INFO}
