server:
  port: ${APP_PORT:${SHELFFLOW_GATEWAY_PORT:4010}}

spring:
  application:
    name: ${APP_NAME:shelfflow-gateway}
  cloud:
    nacos:
      discovery:
        enabled: ${SHELFFLOW_NACOS_ENABLED:false}
        server-addr: ${SHELFFLOW_NACOS_SERVER_ADDR:127.0.0.1:8848}
        namespace: ${SHELFFLOW_NACOS_NAMESPACE:}
        group: ${SHELFFLOW_NACOS_GROUP:DEFAULT_GROUP}
    sentinel:
      enabled: ${SHELFFLOW_SENTINEL_ENABLED:false}
      eager: ${SHELFFLOW_SENTINEL_EAGER:true}
      transport:
        dashboard: ${SHELFFLOW_SENTINEL_DASHBOARD:}
      scg:
        fallback:
          mode: response
          response-status: 429
          response-body: '{"code":"too_many_requests","message":"请求过于频繁，请稍后再试","data":null}'
    gateway:
      routes:
        - id: auth-service
          uri: ${SHELFFLOW_AUTH_SERVICE_BASE_URL:${AUTH_SERVICE_BASE_URL:http://127.0.0.1:4011}}
          predicates:
            - Path=/api/admin/auth/**
        - id: admin-service-products
          uri: ${SHELFFLOW_ADMIN_SERVICE_BASE_URL:${ADMIN_SERVICE_BASE_URL:http://127.0.0.1:4012}}
          predicates:
            - Path=/api/admin/products/**
        - id: admin-service-batches
          uri: ${SHELFFLOW_ADMIN_SERVICE_BASE_URL:${ADMIN_SERVICE_BASE_URL:http://127.0.0.1:4012}}
          predicates:
            - Path=/api/admin/inventory-batches/**
        - id: admin-service-orders
          uri: ${SHELFFLOW_ADMIN_SERVICE_BASE_URL:${ADMIN_SERVICE_BASE_URL:http://127.0.0.1:4012}}
          predicates:
            - Path=/api/admin/orders/**
        - id: admin-service-pickup-points
          uri: ${SHELFFLOW_ADMIN_SERVICE_BASE_URL:${ADMIN_SERVICE_BASE_URL:http://127.0.0.1:4012}}
          predicates:
            - Path=/api/admin/pickup-points/**
        - id: admin-service-pricing-rules
          uri: ${SHELFFLOW_ADMIN_SERVICE_BASE_URL:${ADMIN_SERVICE_BASE_URL:http://127.0.0.1:4012}}
          predicates:
            - Path=/api/admin/pricing-rules/**
        - id: admin-service-loss-stats
          uri: ${SHELFFLOW_ADMIN_SERVICE_BASE_URL:${ADMIN_SERVICE_BASE_URL:http://127.0.0.1:4012}}
          predicates:
            - Path=/api/admin/loss-stats/**
        - id: admin-service-ai-ops
          uri: ${SHELFFLOW_ADMIN_SERVICE_BASE_URL:${ADMIN_SERVICE_BASE_URL:http://127.0.0.1:4012}}
          predicates:
            - Path=/api/admin/ai-ops/**
        - id: admin-service-operation-logs
          uri: ${SHELFFLOW_ADMIN_SERVICE_BASE_URL:${ADMIN_SERVICE_BASE_URL:http://127.0.0.1:4012}}
          predicates:
            - Path=/api/admin/operation-logs/**
        - id: user-service
          uri: ${SHELFFLOW_USER_SERVICE_BASE_URL:${USER_SERVICE_BASE_URL:http://127.0.0.1:4013}}
          predicates:
            - Path=/api/user/**

shelfflow:
  runtime:
    app-name: ${APP_NAME:shelfflow-gateway}
    app-env: ${APP_ENV:development}
    log-level: ${LOG_LEVEL:INFO}
    api-prefix: ${API_PREFIX:/api}
    cors-allowed-origins: ${CORS_ALLOWED_ORIGINS:http://127.0.0.1:3000}
  jwt:
    secret: ${JWT_SECRET:dev-shelfflow-jwt-secret-change-me}
    expires-in: ${JWT_EXPIRES_IN:PT12H}
  downstream:
    auth-service-base-url: ${SHELFFLOW_AUTH_SERVICE_BASE_URL:${AUTH_SERVICE_BASE_URL:http://127.0.0.1:4011}}
    admin-service-base-url: ${SHELFFLOW_ADMIN_SERVICE_BASE_URL:${ADMIN_SERVICE_BASE_URL:http://127.0.0.1:4012}}
    user-service-base-url: ${SHELFFLOW_USER_SERVICE_BASE_URL:${USER_SERVICE_BASE_URL:http://127.0.0.1:4013}}
  gateway:
    sentinel:
      enabled: ${SHELFFLOW_SENTINEL_ENABLED:false}
      route-rules:
        - route-id: user-service
          interval-seconds: ${SHELFFLOW_SENTINEL_GATEWAY_INTERVAL_SECONDS:1}
          count: ${SHELFFLOW_SENTINEL_GATEWAY_USER_QPS:150}
        - route-id: auth-service
          interval-seconds: ${SHELFFLOW_SENTINEL_GATEWAY_INTERVAL_SECONDS:1}
          count: ${SHELFFLOW_SENTINEL_GATEWAY_AUTH_QPS:50}
        - route-id: admin-service-ai-ops
          interval-seconds: ${SHELFFLOW_SENTINEL_GATEWAY_INTERVAL_SECONDS:1}
          count: ${SHELFFLOW_SENTINEL_GATEWAY_AI_QPS:10}

management:
  endpoints:
    web:
      base-path: /
      exposure:
        include: health,info
