server:
  port: ${APP_PORT:${SHELFFLOW_AUTH_SERVICE_PORT:4011}}

spring:
  application:
    name: ${APP_NAME:shelfflow-auth-service}
  cloud:
    nacos:
      discovery:
        enabled: ${SHELFFLOW_NACOS_ENABLED:false}
        server-addr: ${SHELFFLOW_NACOS_SERVER_ADDR:127.0.0.1:8848}

shelfflow:
  runtime:
    app-name: ${APP_NAME:shelfflow-auth-service}
    app-env: ${APP_ENV:development}
    log-level: ${LOG_LEVEL:INFO}
    api-prefix: ${API_PREFIX:/api}
    cors-allowed-origins: ${CORS_ALLOWED_ORIGINS:http://127.0.0.1:3000}
  jwt:
    secret: ${JWT_SECRET:dev-shelfflow-jwt-secret-change-me}
    expires-in: ${JWT_EXPIRES_IN:PT12H}
  legacy:
    base-url: ${SHELFFLOW_LEGACY_BACKEND_BASE_URL:http://127.0.0.1:8082}

management:
  endpoints:
    web:
      base-path: /
      exposure:
        include: health,info
